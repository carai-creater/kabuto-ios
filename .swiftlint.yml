disabled_rules:
  - trailing_whitespace
opt_in_rules:
  - empty_count
  - force_unwrapping
  - implicit_return
  - first_where
  - sorted_imports
included:
  - KabutoiOS
  - KabutoiOSTests
excluded:
  - build
  - DerivedData
line_length:
  warning: 120
  error: 200
identifier_name:
  min_length: 2
  excluded:
    - id
    - url
    - to
